name: Make release and docs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create release + upload assets
  packages: read    # pull image from GHCR

jobs:
  build:
    runs-on: ubuntu-latest

    #container:
    #  image: ghcr.io/${{ github.repository }}:main
    #  options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Get repo info
        run: |
          echo "
            REPO_TAG=$(git describe --tags --abbrev=0)
            REPO_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            " >> $GITHUB_ENV

      - name: Build sdist
        run: |
          mkdir foobar
          touch foobar/foo
          touch foobar/bar

      - name: Make artifact tarball
        run: |
          set -e
          tar cf - ./foobar | xz > "artifact-$REPO_TAG.tar.xz"

      - name: Make code ZIP archive for Zenodo
        run: |
          git archive --format=zip --output "./gateau-$REPO_TAG.zip" "$REPO_BRANCH" \

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifact-$REPO_TAG.tar*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Zenodo deposition
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_ID: 553153
          ZENODO_API_TARGET: https://sandbox.zenodo.org/api
          ZENODO_FILES: |
            ./sample.png:sample.png
            ./gateau-${{env.REPO_TAG}}.zip:gateau-${{env.REPO_TAG}}.zip
            ./artifact-${{env.REPO_TAG}}.tar.xz:artifact-${{env.REPO_TAG}}.tar.xz
        run: |
          ./scripts/zenodo-file-upload.sh


